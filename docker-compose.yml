
# 全局日志配置，防止 Docker 容器日志无限增长撑满磁盘
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "500m"
    max-file: "5"

# OpenClaw 服务的通用基础配置模板
x-openclaw-base: &openclaw-base
  image: openclaw:v2026.3.13-1
  restart: unless-stopped
  env_file: .env
  depends_on:
    - postgres-db
  networks:
    - openclaw-net
  logging: *default-logging
  deploy:
    resources:
      limits:
        memory: 2G

services:
  # 统一知识底座：PostgreSQL (带向量扩展)
  postgres-db:
    image: pgvector/pgvector:pg16
    container_name: openclaw-postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - openclaw-net
    logging: *default-logging

  # 1. 协调中枢 orchestrator
  openclaw-orchestrator:
    <<: *openclaw-base
    container_name: openclaw-orchestrator
    hostname: openclaw-orchestrator
    ports:
      - "18001:18789"
      - "13001:3000"
    environment:
      - OPENAI_API_KEY=${ALIYUN_API_KEY}
      - OPENAI_BASE_URL=${ALIYUN_BASE_URL}
      - OPENAI_MODEL=qwen3.5-plus
      - DATABASE_URL=postgresql://orchestrator_user:${ORCHESTRATOR_DB_PASS}@postgres-db:5432/openclaw_db
      - TZ=Asia/Shanghai
      - FEISHU_APP_ID=${FEISHU_ORCHESTRATOR_APP_ID}
      - FEISHU_APP_SECRET=${FEISHU_ORCHESTRATOR_APP_SECRET}
      - SECRET_GATEWAY_TOKEN=${SECRET_GATEWAY_TOKEN}
    volumes:
      - ./openclaw-orchestrator:/home/node/.openclaw
      - ./openclaw-orchestrator/workspace:/workspace
      - ./common/extensions/postgres-tool:/home/node/.openclaw/extensions/postgres-tool
      - ./common/extensions/task-notifier:/home/node/.openclaw/extensions/task-notifier
      - /opt/openclaw/extensions/memory-lancedb:/home/node/.openclaw/extensions/memory-lancedb
      - /opt/openclaw/extensions/openai:/home/node/.openclaw/extensions/openai
      - ./sentinel/credentials:/home/node/.openclaw/credentials

  # 2. 研发部 dev
  openclaw-dev:
    <<: *openclaw-base
    container_name: openclaw-dev
    hostname: openclaw-dev
    ports:
      - "18002:18789"
      - "13002:3000"
    environment:
      - OPENAI_API_KEY=${ALIYUN_API_KEY}
      - OPENAI_BASE_URL=${ALIYUN_BASE_URL}
      - OPENAI_MODEL=qwen3-coder-next
      - DATABASE_URL=postgresql://dev_user:${DEV_DB_PASS}@postgres-db:5432/openclaw_db
      - TZ=Asia/Shanghai
      - FEISHU_APP_ID=${FEISHU_DEV_APP_ID}
      - FEISHU_APP_SECRET=${FEISHU_DEV_APP_SECRET}
      - SECRET_GATEWAY_TOKEN=${SECRET_GATEWAY_TOKEN}
    volumes:
      - ./openclaw-dev:/home/node/.openclaw
      - ./common/extensions/postgres-tool:/home/node/.openclaw/extensions/postgres-tool
      - ./common/extensions/task-notifier:/home/node/.openclaw/extensions/task-notifier
      - /opt/openclaw/extensions/memory-lancedb:/home/node/.openclaw/extensions/memory-lancedb
      - /opt/openclaw/extensions/openai:/home/node/.openclaw/extensions/openai
      - ~/code-repo:/app/repo

  # 3. 产品部 pm
  openclaw-pm:
