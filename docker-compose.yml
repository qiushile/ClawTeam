
# 全局日志配置，防止 Docker 容器日志无限增长撑满磁盘 [1]
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "500m"
    max-file: "5"

services:
  # 统一知识底座：PostgreSQL (带向量扩展)
  postgres-db:
    image: pgvector/pgvector:pg16
    container_name: openclaw-postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Shanghai # 统一时区
    ports:
      - "127.0.0.1:15432:5432" # 仅绑定本地回环，防止数据库端口暴露到公网
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    logging: *default-logging

  # 1. 协调中枢 Agent
  agent-orchestrator:
    image: openclaw:local
    container_name: openclaw-orchestrator
    restart: unless-stopped
    ports:
      - "127.0.0.1:18001:18789" # Gateway 端口，仅在本地/Tailscale内网可用 [2, 3]
      - "127.0.0.1:13000:3000"   # Orchestrator 的 Web UI 监控看板 [4]
    environment:
      - ALIYUN_API_KEY=${ALIYUN_API_KEY}
      - OPENAI_API_KEY=${ALIYUN_API_KEY}
      - OPENAI_BASE_URL=https://dashscope.aliyuncs.com/compatible-mode/v1
      - OPENAI_MODEL=qwen2.5-72b-instruct
      - DATABASE_URL=postgresql://orchestrator_user:${ORCHESTRATOR_DB_PASS}@postgres-db:5432/openclaw_db
      - TZ=Asia/Shanghai # 确保心跳定时任务触发时间准确 [5]
      - FEISHU_APP_ID=${FEISHU_ORCHESTRATOR_APP_ID}
      - FEISHU_APP_SECRET=${FEISHU_ORCHESTRATOR_APP_SECRET}
    volumes:
      - ./workspace-orchestrator:/home/node/.openclaw
    depends_on:
      - postgres-db
    deploy:
      resources:
        limits:
          memory: 2G # 限制最大内存，防止 OOM 拖垮宿主机 [6, 7]
    logging: *default-logging

  # 2. 研发助手 Agent (Sandbox)
  agent-dev:
    image: openclaw-sandbox:common
    container_name: openclaw-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:13001:3000"   # 独立映射 Dev 的 Web UI，供独立诊断 [4]
    environment:
      - ALIYUN_API_KEY=${ALIYUN_API_KEY}
      - OPENAI_API_KEY=${ALIYUN_API_KEY}
      - OPENAI_BASE_URL=https://dashscope.aliyuncs.com/compatible-mode/v1
      - OPENAI_MODEL=qwen2.5-coder-32b-instruct
      - DATABASE_URL=postgresql://dev_user:${DEV_DB_PASS}@postgres-db:5432/openclaw_db
      - TZ=Asia/Shanghai
      - FEISHU_APP_ID=${FEISHU_DEV_APP_ID}
      - FEISHU_APP_SECRET=${FEISHU_DEV_APP_SECRET}
    volumes:
      - ./workspace-dev:/home/node/.openclaw
      - ~/code-repo:/app/repo # 挂载本地代码仓库用于分析
    depends_on:
      - postgres-db
    deploy:
      resources:
        limits:
          memory: 2G
    logging: *default-logging

  # 3. 产品经理 Agent
  agent-pm:
    image: openclaw:local
    container_name: openclaw-pm
    restart: unless-stopped
    ports:
      - "127.0.0.1:13002:3000"   # 独立映射 PM 的 Web UI，供独立诊断 [4]
    environment:
      - ALIYUN_API_KEY=${ALIYUN_API_KEY}
      - OPENAI_API_KEY=${ALIYUN_API_KEY}
      - OPENAI_BASE_URL=https://dashscope.aliyuncs.com/compatible-mode/v1
      - OPENAI_MODEL=qwen-plus
      - DATABASE_URL=postgresql://pm_user:${PM_DB_PASS}@postgres-db:5432/openclaw_db
      - TZ=Asia/Shanghai
      - FEISHU_APP_ID=${FEISHU_PM_APP_ID}
      - FEISHU_APP_SECRET=${FEISHU_PM_APP_SECRET}
    volumes:
      - ./workspace-pm:/home/node/.openclaw
    depends_on:
      - postgres-db
    deploy:
      resources:
        limits:
          memory: 2G
    logging: *default-logging

volumes:
  pgdata:
