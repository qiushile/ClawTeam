
# 全局日志配置，防止 Docker 容器日志无限增长撑满磁盘 [1]
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "500m"
    max-file: "5"

services:
  # 统一知识底座：PostgreSQL (带向量扩展)
  postgres-db:
    image: pgvector/pgvector:pg16
    container_name: openclaw-postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Shanghai # 统一时区
    ports:
      - "15432:5432" # 仅绑定本地回环，防止数据库端口暴露到公网
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    logging: *default-logging

  # 1. 协调中枢 orchestrator
  openclaw-orchestrator:
    image: openclaw:local
    container_name: openclaw-orchestrator
    restart: unless-stopped
    ports:
      - "18001:18789" # Gateway 端口，仅在本地/Tailscale内网可用 [2, 3]
      - "13001:3000"   # Orchestrator 的 Web UI 监控看板 [4]
    environment:
      - ALIYUN_API_KEY=${ALIYUN_API_KEY}
      - OPENAI_API_KEY=${ALIYUN_API_KEY}
      - OPENAI_BASE_URL=https://coding.dashscope.aliyuncs.com/v1
      - OPENAI_MODEL=qwen3-coder-plus
      - DATABASE_URL=postgresql://orchestrator_user:${ORCHESTRATOR_DB_PASS}@postgres-db:5432/openclaw_db
      - TZ=Asia/Shanghai # 确保心跳定时任务触发时间准确 [5]
      - FEISHU_APP_ID=${FEISHU_ORCHESTRATOR_APP_ID}
      - FEISHU_APP_SECRET=${FEISHU_ORCHESTRATOR_APP_SECRET}
    volumes:
      - ./openclaw-orchestrator:/home/node/.openclaw
    depends_on:
      - postgres-db
    deploy:
      resources:
        limits:
          memory: 2G # 限制最大内存，防止 OOM 拖垮宿主机 [6, 7]
    logging: *default-logging

  # 2. 研发部 dev
  openclaw-dev:
